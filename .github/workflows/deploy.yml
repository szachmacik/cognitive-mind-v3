name: Deploy CognitiveMind v3.0

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy SQL Functions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Install psql
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
          # Deploy SQL
          PGPASSWORD="${SUPABASE_SERVICE_KEY}" psql \
            "postgresql://postgres@db.blgdhfcosqjzrutncbbr.supabase.co:5432/postgres" \
            -f sql/MISSING_SQL_FUNCTIONS.sql
          
          PGPASSWORD="${SUPABASE_SERVICE_KEY}" psql \
            "postgresql://postgres@db.blgdhfcosqjzrutncbbr.supabase.co:5432/postgres" \
            -f sql/AUTONOMOUS_CRON_JOBS.sql
      
      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler
          cd worker
          wrangler deploy
